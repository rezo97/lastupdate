<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#2563eb">
    
    <title>Scanner App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        /* კამერის ჩარჩოს კორექცია მობილურისთვის */
        #reader { width: 100%; border-radius: 12px; overflow: hidden; border: none !important; }
        #reader video { border-radius: 12px; object-fit: cover; }
        
        /* ვაქრობთ ტექსტის მონიშვნის შესაძლებლობას, რომ სწრაფი კლიკებისას არ მოინიშნოს */
        body { -webkit-user-select: none; user-select: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans h-screen flex flex-col">

    <header class="bg-blue-600 text-white p-4 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-bold tracking-wide">📦 QR სკანერი</h1>
        <div class="flex space-x-4">
            <button onclick="showTab('scanner')" class="font-semibold hover:text-blue-200">სკანერი</button>
            <button onclick="showTab('history')" class="font-semibold hover:text-blue-200">ისტორია</button>
        </div>
    </header>

    <main class="flex-1 p-4 overflow-y-auto w-full max-w-md mx-auto">
        
        <div id="scanner-tab" class="flex flex-col items-center">
            
            <div id="status-card" class="bg-white w-full p-4 rounded-xl shadow-sm border border-gray-200 mb-4 text-center transition-colors duration-300">
                <h2 id="instruction-text" class="text-lg font-bold text-blue-600">1. დაასკანერე ნივთის QR</h2>
                <p id="scanned-order-display" class="text-sm text-gray-500 mt-1 hidden">შეკვეთა: <span id="order-number" class="font-bold text-gray-800"></span></p>
            </div>

            <div id="reader" class="shadow-lg bg-black w-full"></div>

            <button id="reset-btn" onclick="resetScan()" class="mt-6 bg-gray-200 text-gray-700 px-6 py-3 rounded-full font-semibold hidden hover:bg-gray-300 transition w-full max-w-xs active:bg-gray-400">
                თავიდან დაწყება
            </button>
        </div>

        <div id="history-tab" class="hidden flex-col h-full">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-gray-700">ბოლო ჩანაწერები</h2>
                <button onclick="clearHistory()" class="text-red-500 text-sm font-semibold hover:underline p-2">გასუფთავება</button>
            </div>
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden mb-4">
                <ul id="history-list" class="divide-y divide-gray-100">
                    </ul>
            </div>
        </div>

    </main>

    <script>
        let currentOrder = null;
        let html5QrcodeScanner = null;

        // აპლიკაციის ჩატვირთვისას ისტორიის განახლება
        document.addEventListener("DOMContentLoaded", () => {
            loadHistory();
            startScanner();
        });

        function startScanner() {
            html5QrcodeScanner = new Html5QrcodeScanner(
                "reader",
                { fps: 10, qrbox: {width: 250, height: 250}, aspectRatio: 1.0 },
                /* verbose= */ false);
            html5QrcodeScanner.render(onScanSuccess, onScanFailure);
        }

        function onScanSuccess(decodedText, decodedResult) {
            // თუ პირველი სკანირებაა (ნივთი)
            if (!currentOrder) {
                currentOrder = decodedText;
                
                // UI-ს შეცვლა
                document.getElementById('instruction-text').innerText = "2. დაასკანერე თაროს QR";
                document.getElementById('instruction-text').classList.replace('text-blue-600', 'text-green-600');
                
                document.getElementById('scanned-order-display').classList.remove('hidden');
                document.getElementById('order-number').innerText = currentOrder;
                
                document.getElementById('reset-btn').classList.remove('hidden');
                
                // ვიბრაცია (თუ ტელეფონს აქვს მხარდაჭერა) წარმატებულ სკანირებაზე
                if (navigator.vibrate) navigator.vibrate(100);

                // პაუზა რომ ზედიზედ არ წაიკითხოს იგივე
                html5QrcodeScanner.pause(true);
                setTimeout(() => html5QrcodeScanner.resume(), 1500);
            } 
            // თუ მეორე სკანირებაა (თარო)
            else {
                let shelfQr = decodedText;
                saveRecord(currentOrder, shelfQr);
                
                // ვიბრაცია დასრულებისას
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]);

                // UI-ს დაბრუნება საწყის მდგომარეობაში ოდნავი დაყოვნებით
                html5QrcodeScanner.pause(true);
                document.getElementById('instruction-text').innerText = "✅ წარმატებით დაემატა!";
                
                setTimeout(() => {
                    resetScan();
                    html5QrcodeScanner.resume();
                }, 2000);
            }
        }

        function onScanFailure(error) {
            // უგულებელვყოფთ შეცდომებს, რადგან ყოველ კადრზე აგდებს თუ QR ვერ იპოვა
        }

        function resetScan() {
            currentOrder = null;
            document.getElementById('instruction-text').innerText = "1. დაასკანერე ნივთის QR";
            document.getElementById('instruction-text').classList.replace('text-green-600', 'text-blue-600');
            document.getElementById('scanned-order-display').classList.add('hidden');
            document.getElementById('reset-btn').classList.add('hidden');
        }

        function saveRecord(order, shelf) {
            let history = JSON.parse(localStorage.getItem('qr_history')) || [];
            let timeString = new Date().toLocaleTimeString('ka-GE', { hour: '2-digit', minute: '2-digit' });
            
            history.unshift({ order: order, shelf: shelf, time: timeString }); // ვამატებთ თავში
            localStorage.setItem('qr_history', JSON.stringify(history));
            loadHistory();
        }

        function loadHistory() {
            let history = JSON.parse(localStorage.getItem('qr_history')) || [];
            let list = document.getElementById('history-list');
            list.innerHTML = "";
            
            if (history.length === 0) {
                list.innerHTML = '<li class="p-6 text-center text-gray-500 text-sm">ისტორია ცარიელია</li>';
                return;
            }

            history.forEach(item => {
                let li = document.createElement('li');
                li.className = "p-4 flex justify-between items-center hover:bg-gray-50 active:bg-gray-100 transition";
                li.innerHTML = `
                    <div class="flex flex-col">
                        <span class="font-bold text-gray-800 text-lg">${item.order}</span>
                        <span class="text-xs text-gray-400 mt-1">${item.time}</span>
                    </div>
                    <div class="bg-blue-100 text-blue-800 text-sm font-semibold px-4 py-2 rounded-full shadow-sm">
                        თარო: ${item.shelf}
                    </div>
                `;
                list.appendChild(li);
            });
        }

        function clearHistory() {
            if(confirm("ნამდვილად გსურთ ისტორიის წაშლა?")) {
                localStorage.removeItem('qr_history');
                loadHistory();
            }
        }

        function showTab(tabName) {
            if(tabName === 'scanner') {
                document.getElementById('scanner-tab').classList.remove('hidden');
                document.getElementById('history-tab').classList.add('hidden');
                document.getElementById('history-tab').classList.remove('flex');
            } else {
                document.getElementById('scanner-tab').classList.add('hidden');
                document.getElementById('history-tab').classList.remove('hidden');
                document.getElementById('history-tab').classList.add('flex');
            }
        }
    </script>
</body>
</html>
